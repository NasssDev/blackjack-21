services:
  postgres:
    image: postgres:16
    container_name: blackjack21-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: blackjack
      POSTGRES_PASSWORD: blackjack21
      POSTGRES_DB: blackjack21
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
